paths:
  /api/eventFollows/:
    post:
      tags: [eFollow]
      summary: Cria uma nova ligação de seguidor entre um evento e um utilizador
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [followerId, followingId]
              properties:
                followerId:
                  type: Number
                  example: 2
                followingId:
                  type: number
                  example: 3

      responses:
        200:
          description: Sucesso